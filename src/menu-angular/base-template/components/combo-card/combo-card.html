<div
  class="group relative p-6 {{ clipPathClass() }} {{ colorClass() }}  transition-all duration-300 overflow-hidden cursor-pointer active:scale-100  flex flex-col"
  [style.transform]="translateValue()"
>
  @if (index() % 2 === 0) {
    <!-- Layout 1: Image on top -->
    <div class="relative flex flex-col h-full gap-4">
      <div class="relative w-60 md:w-50 h-50  md:h-80 mx-auto rounded-full border flex flex-col justify-center items-center border-white group">
        <img
          [src]="combo().url"
          [alt]="combo().name"
          [title]="combo().name"
          class="w-50 md:w-full h-auto transition-transform duration-300"
        />
        <p
          class="absolute -bottom-4 left-4 md:-left-4 translate-x-1/2 py-1 px-4  rounded-full tracking-widest bg-primary font-display text-white text-xl"
        >
          {{ combo().price | precio }}
        </p>
        @if (canOrder()) {
          <app-add-button
            customClass="absolute bottom-0 -right-5 border-px border-white active"
            (clicked)="addToCart.emit(combo())"
          ></app-add-button>
        }
      </div>

      <div class="flex-1 flex flex-col gap-3">
        <h3 class="text-3xl font-display text-primary-text text-center">{{ combo().name }}</h3>
        <div class="flex gap-3 mt-auto">
          <p class="text-primary-text/70 max-w-xs text-center font-body leading-relaxed line-clamp-3">
            {{ combo().description }}
          </p>
        </div>
      </div>
    </div>
  } @else {
    <!-- Layout 2: Image on bottom -->
    <div class="relative flex flex-col h-full gap-4">
      <div class="flex-1 flex flex-col gap-3">
        <h3 class="text-3xl font-display text-primary-text text-center">{{ combo().name }}</h3>
        <div class="flex gap-3 mt-auto">
          <p class="text-primary-text/70 max-w-xs text-center font-body leading-relaxed line-clamp-3">
            {{ combo().description }}
          </p>
        </div>
      </div>

      <div class="relative  w-60 md:w-50 h-50 md:h-80 mx-auto rounded-full border flex flex-col justify-center items-center border-white group">
        <img
          [src]="combo().url"
          [alt]="combo().name"
          [title]="combo().name"
          class="w-50 md:w-full h-auto transition-transform duration-300"
        />
        <p
          class="absolute -bottom-4  left-4 md:-left-4 translate-x-1/2 py-1 px-4 rounded-full tracking-widest bg-primary font-display text-white text-xl"
        >
          {{ combo().price | precio }}
        </p>
        @if (canOrder()) {
          <app-add-button
            customClass="absolute bottom-0 -right-5 border-px border-white active"
            (clicked)="addToCart.emit(combo())"
          ></app-add-button>
        }
      </div>
    </div>
  }
</div>
